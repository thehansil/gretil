name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: gretil-deploy
  cancel-in-progress: true

jobs:
  build:
    name: Build & Publish
    runs-on:
      - self-hosted
      - unraid

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Register Discord commands
        run: |
          docker run --rm \
            --pull=always \
            -v "$PWD:/app" \
            -w /app \
            -e TOKEN="${{ secrets.DISCORD_TOKEN }}" \
            -e CLIENT_ID="${{ secrets.CLIENT_ID }}" \
            -e GUILD_ID="${{ secrets.GUILD_ID }}" \
            node:24 \
            sh -c "npm ci && npm run register-commands"

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: hansil/gretil:latest

  deploy:
    name: Deploy
    needs: build
    runs-on:
      - self-hosted
      - unraid

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy Container
        run: |
          chmod +x scripts/deploy.sh
          ./scripts/deploy.sh
